name: Daily Stock Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report Type'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - alert
          - evening
  schedule:
    - cron: '0 0 * * 1-5'      # 08:30 北京时间
    - cron: '30 6 * * 1-5'     # 14:30 北京时间
    - cron: '0 8 * * 1-5'      # 16:00 北京时间

jobs:
  stock-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests charset-normalizer
      
      - name: Run stock report
        run: |
          python stock_report.py > report.txt 2>&1 || true
          cat report.txt
          echo "report_content=$(cat report.txt | base64)" >> $GITHUB_OUTPUT
      
      - name: Send to WeChat
        if: env.WECOM_WEBHOOK != ''
        run: |
          CONTENT=$(cat report.txt | base64 -w0)
          curl -X POST "$WECOM_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$CONTENT\"}}"
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
