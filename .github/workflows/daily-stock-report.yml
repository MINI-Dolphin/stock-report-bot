name: Daily Stock Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1-5'      # 08:30 北京时间
    - cron: '30 6 * * 1-5'     # 14:30 北京时间
    - cron: '0 8 * * 1-5'      # 16:00 北京时间

jobs:
  stock-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests charset-normalizer
      
      - name: Run stock report
        run: python stock_report.py
      
      - name: Send to WeChat
        if: env.WECOM_WEBHOOK != ''
        run: |
          REPORT=$(python stock_report.py 2>&1)
          PAYLOAD=$(echo "{\"msgtype\":\"text\",\"text\":{\"content\":\"$REPORT\"}}" | base64 -w0)
          curl -X POST "$WECOM_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$REPORT\"}}"
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
